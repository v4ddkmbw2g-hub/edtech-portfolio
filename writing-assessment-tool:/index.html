<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Assessment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #E8D4C4;
            padding: 30px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header input {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #999;
            border-radius: 4px;
            width: 300px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chart-box {
            background: #F3EFE7;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .chart-box h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        svg {
            cursor: pointer;
            max-width: 100%;
            height: auto;
        }

        .count-boxes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .count-box {
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .count-box.emerging {
            background-color: #378ADD;
            color: white;
        }

        .count-box.developing {
            background-color: #BA7517;
            color: white;
        }

        .count-box.mastered {
            background-color: #639922;
            color: white;
        }

        .count-box:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .right-panel {
            background: #F3EFE7;
            padding: 20px;
            border-radius: 8px;
        }

        .right-panel h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skill-item {
            background: white;
            padding: 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ddd;
        }

        .skill-label {
            font-size: 14px;
            color: #333;
            flex: 1;
        }

        .skill-buttons {
            display: flex;
            gap: 6px;
        }

        .score-btn {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            background-color: white;
            color: #666;
        }

        .score-btn:hover {
            background-color: #f5f5f5;
        }

        .score-btn.e {
            background-color: #378ADD;
            color: white;
            border-color: #378ADD;
        }

        .score-btn.d {
            background-color: #BA7517;
            color: white;
            border-color: #BA7517;
        }

        .score-btn.m {
            background-color: #639922;
            color: white;
            border-color: #639922;
        }

        .comments-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .comment-box {
            background: #F3EFE7;
            padding: 20px;
            border-radius: 8px;
        }

        .comment-box h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .comment-box textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            background-color: #E3F2FD;
            resize: vertical;
        }

        .comment-box textarea:focus {
            outline: none;
            border-color: #378ADD;
            box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: #378ADD;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2a6bb3;
            box-shadow: 0 2px 8px rgba(55, 138, 221, 0.3);
        }

        .btn-secondary {
            background-color: #666;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #555;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 50px auto;
            padding: 0;
            width: 90%;
            max-width: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            border-left: 4px solid #378ADD;
            background: #F3EFE7;
        }

        .modal-header h2 {
            font-size: 18px;
            color: #333;
            margin: 0;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-skills {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-skill {
            padding: 10px;
            background: #F3EFE7;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        .modal-footer {
            padding: 15px 20px;
            background: #F3EFE7;
            text-align: right;
            border-top: 1px solid #e0e0e0;
        }

        .close-btn {
            background: #666;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .close-btn:hover {
            background: #555;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .comments-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Writing Assessment</h1>
            <input type="text" id="studentName" placeholder="Student Name" />
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="chart-box">
                    <h3>Assessment Overview</h3>
                    <svg id="pieChart" viewBox="0 0 200 200" style="width: 180px; height: 180px;"></svg>
                    <div class="count-boxes">
                        <div class="count-box emerging" id="countEmerging">
                            <div id="countEText">Emerging</div>
                            <div id="numEmerging">0</div>
                        </div>
                        <div class="count-box developing" id="countDeveloping">
                            <div id="countDText">Developing</div>
                            <div id="numDeveloping">0</div>
                        </div>
                        <div class="count-box mastered" id="countMastered">
                            <div id="countMText">Mastered</div>
                            <div id="numMastered">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <h3>Writing Skills Assessment</h3>
                <div class="skills-list" id="skillsList"></div>
            </div>
        </div>

        <div class="comments-section">
            <div class="comment-box">
                <h3>Strengths</h3>
                <textarea id="strengths" placeholder="Describe student strengths and positive growth in writing skills..."></textarea>
            </div>
            <div class="comment-box">
                <h3>Stretches: Areas of Growth</h3>
                <textarea id="stretches" placeholder="Identify areas where the student is working toward growth..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="exportPDF()">Export as PDF</button>
            <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Skills</h2>
            </div>
            <div class="modal-body">
                <div class="modal-skills" id="modalSkills"></div>
            </div>
            <div class="modal-footer">
                <button class="close-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const skills = [
            { id: 0, label: "Demonstrates curiosity and engagement" },
            { id: 1, label: "Prints using upper and lower case letters" },
            { id: 2, label: "Writes complete and detailed sentences" },
            { id: 3, label: "Applies grammar and punctuation to their writing" },
            { id: 4, label: "Spells words correctly that mirror learned patterns" },
            { id: 5, label: "Writes narrative, opinion, and explanatory pieces" },
            { id: 6, label: "Revises and edits with guidance" }
        ];

        let scores = {};
        let comments = { strengths: '', stretches: '' };

        const colors = {
            e: '#378ADD',
            d: '#BA7517',
            m: '#639922'
        };

        // Initialize
        function init() {
            loadFromStorage();
            renderSkills();
            updateChart();
            renderComments();
        }

        function renderSkills() {
            const skillsList = document.getElementById('skillsList');
            skillsList.innerHTML = '';

            skills.forEach(skill => {
                const skillItem = document.createElement('div');
                skillItem.className = 'skill-item';

                const score = scores[skill.id] || null;
                let borderColor = '#ddd';
                if (score === 'e') borderColor = '#378ADD';
                else if (score === 'd') borderColor = '#BA7517';
                else if (score === 'm') borderColor = '#639922';
                skillItem.style.borderLeftColor = borderColor;

                skillItem.innerHTML = `
                    <span class="skill-label">${skill.label}</span>
                    <div class="skill-buttons">
                        <button class="score-btn ${scores[skill.id] === 'e' ? 'e' : ''}" onclick="setScore(${skill.id}, 'e')">E</button>
                        <button class="score-btn ${scores[skill.id] === 'd' ? 'd' : ''}" onclick="setScore(${skill.id}, 'd')">D</button>
                        <button class="score-btn ${scores[skill.id] === 'm' ? 'm' : ''}" onclick="setScore(${skill.id}, 'm')">M</button>
                    </div>
                `;
                skillsList.appendChild(skillItem);
            });
        }

        function setScore(skillId, score) {
            scores[skillId] = scores[skillId] === score ? null : score;
            saveToStorage();
            renderSkills();
            updateChart();
        }

        function updateChart() {
            const countE = Object.values(scores).filter(s => s === 'e').length;
            const countD = Object.values(scores).filter(s => s === 'd').length;
            const countM = Object.values(scores).filter(s => s === 'm').length;

            document.getElementById('numEmerging').textContent = countE;
            document.getElementById('numDeveloping').textContent = countD;
            document.getElementById('numMastered').textContent = countM;

            const total = countE + countD + countM;
            const angles = {
                e: (countE / skills.length) * 360,
                d: (countD / skills.length) * 360,
                m: (countM / skills.length) * 360
            };

            drawPie(angles);
        }

        function drawPie(angles) {
            const svg = document.getElementById('pieChart');
            svg.innerHTML = '';

            const centerX = 100, centerY = 100, radius = 80;
            let currentAngle = -90;

            const slices = [
                { angle: angles.e, color: colors.e, score: 'e', label: 'Emerging' },
                { angle: angles.d, color: colors.d, score: 'd', label: 'Developing' },
                { angle: angles.m, color: colors.m, score: 'm', label: 'Mastered' }
            ];

            slices.forEach(slice => {
                if (slice.angle > 0) {
                    const startAngle = (currentAngle * Math.PI) / 180;
                    const endAngle = ((currentAngle + slice.angle) * Math.PI) / 180;

                    const x1 = centerX + radius * Math.cos(startAngle);
                    const y1 = centerY + radius * Math.sin(startAngle);
                    const x2 = centerX + radius * Math.cos(endAngle);
                    const y2 = centerY + radius * Math.sin(endAngle);

                    const largeArc = slice.angle > 180 ? 1 : 0;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute(
                        'd',
                        `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`
                    );
                    path.setAttribute('fill', slice.color);
                    path.setAttribute('stroke', 'white');
                    path.setAttribute('stroke-width', '2');
                    path.style.cursor = 'pointer';
                    path.onclick = () => openModal(slice.score);
                    svg.appendChild(path);

                    currentAngle += slice.angle;
                }
            });

            // Center circle for donut effect
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', centerX);
            circle.setAttribute('cy', centerY);
            circle.setAttribute('r', 50);
            circle.setAttribute('fill', 'white');
            svg.appendChild(circle);
        }

        function openModal(score) {
            const scoreMap = { e: 'Emerging', d: 'Developing', m: 'Mastered' };
            const filtered = skills.filter(s => scores[s.id] === score);

            if (filtered.length === 0) {
                alert(`No skills marked as ${scoreMap[score]}.`);
                return;
            }

            document.getElementById('modalTitle').textContent = `${scoreMap[score]} Skills`;
            const modalSkills = document.getElementById('modalSkills');
            modalSkills.innerHTML = filtered
                .map(s => `<div class="modal-skill">${s.label}</div>`)
                .join('');

            // Color the left border
            const modal = document.querySelector('.modal-header');
            modal.style.borderLeftColor = colors[score];

            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderComments() {
            document.getElementById('strengths').value = comments.strengths;
            document.getElementById('stretches').value = comments.stretches;
        }

        function saveToStorage() {
            comments.strengths = document.getElementById('strengths').value;
            comments.stretches = document.getElementById('stretches').value;

            localStorage.setItem('writingScores', JSON.stringify(scores));
            localStorage.setItem('writingComments', JSON.stringify(comments));
            localStorage.setItem('writingStudentName', document.getElementById('studentName').value);
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('writingScores');
            if (stored) scores = JSON.parse(stored);

            const storedComments = localStorage.getItem('writingComments');
            if (storedComments) comments = JSON.parse(storedComments);

            const storedName = localStorage.getItem('writingStudentName');
            if (storedName) document.getElementById('studentName').value = storedName;
        }

        function resetAll() {
            if (confirm('Are you sure? This will clear all scores and comments.')) {
                scores = {};
                comments = { strengths: '', stretches: '' };
                document.getElementById('studentName').value = '';
                localStorage.removeItem('writingScores');
                localStorage.removeItem('writingComments');
                localStorage.removeItem('writingStudentName');
                init();
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageHeight = doc.internal.pageSize.getHeight();
            const pageWidth = doc.internal.pageSize.getWidth();
            let yPos = 15;

            // Title
            doc.setFontSize(20);
            doc.text('Writing Assessment', pageWidth / 2, yPos, { align: 'center' });
            yPos += 10;

            // Student Name
            doc.setFontSize(12);
            const studentName = document.getElementById('studentName').value || 'Student';
            doc.text(`Student: ${studentName}`, 15, yPos);
            yPos += 8;

            // Summary Counts
            const countE = Object.values(scores).filter(s => s === 'e').length;
            const countD = Object.values(scores).filter(s => s === 'd').length;
            const countM = Object.values(scores).filter(s => s === 'm').length;

            doc.setFontSize(11);
            doc.text(`Emerging: ${countE} | Developing: ${countD} | Mastered: ${countM}`, 15, yPos);
            yPos += 10;

            // Strengths
            doc.setFontSize(12);
            doc.text('Strengths:', 15, yPos);
            yPos += 6;
            doc.setFontSize(10);
            const strengthsText = document.getElementById('strengths').value || '(No strengths recorded)';
            const strengthsLines = doc.splitTextToSize(strengthsText, pageWidth - 30);
            doc.text(strengthsLines, 15, yPos);
            yPos += strengthsLines.length * 5 + 5;

            // Stretches
            doc.setFontSize(12);
            doc.text('Stretches: Areas of Growth:', 15, yPos);
            yPos += 6;
            doc.setFontSize(10);
            const stretchesText = document.getElementById('stretches').value || '(No areas of growth recorded)';
            const stretchesLines = doc.splitTextToSize(stretchesText, pageWidth - 30);
            doc.text(stretchesLines, 15, yPos);
            yPos += stretchesLines.length * 5 + 10;

            // Skills List
            doc.setFontSize(12);
            doc.text('Writing Skills Assessment:', 15, yPos);
            yPos += 6;
            doc.setFontSize(10);

            skills.forEach(skill => {
                const score = scores[skill.id];
                const scoreLabel = score === 'e' ? 'Emerging' : score === 'd' ? 'Developing' : score === 'm' ? 'Mastered' : 'Not Assessed';
                const line = `${skill.label} — ${scoreLabel}`;
                const lines = doc.splitTextToSize(line, pageWidth - 30);
                doc.text(lines, 15, yPos);
                yPos += lines.length * 4 + 2;

                if (yPos > pageHeight - 20) {
                    doc.addPage();
                    yPos = 15;
                }
            });

            doc.save(`${studentName}_writing_assessment.pdf`);
        }

        // Event listeners for auto-save
        document.getElementById('strengths').addEventListener('change', saveToStorage);
        document.getElementById('stretches').addEventListener('change', saveToStorage);
        document.getElementById('studentName').addEventListener('change', saveToStorage);
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('modal');
            if (e.target === modal) closeModal();
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
