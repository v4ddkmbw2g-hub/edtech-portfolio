<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Studies Assessment Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body style="margin: 0; padding: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">

<style>
  :root {
    --color-text-primary: #2c3e50;
    --color-text-secondary: #7f8c8d;
    --color-background-primary: #FBF9F7;
    --color-background-secondary: #F3EFE7;
    --color-border-primary: #378ADD;
    --color-border-secondary: #D4C5B9;
    --color-border-tertiary: #E8DDD4;
  }
  
  * { box-sizing: border-box; }
  body { margin: 0; padding: 1.5rem; background: #E8D4C4; }
  .container { max-width: 1400px; margin: 0 auto; }
  
  .header { margin-bottom: 2rem; }
  .header h1 { margin: 0; font-size: 24px; font-weight: 600; color: var(--color-text-primary); }
  
  .top-boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
  
  .box { padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); }
  .box-title { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .chart-area { background: var(--color-background-primary); border-radius: 8px; padding: 1rem; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 1rem; }
  #pieChart { width: 100%; height: 160px; cursor: pointer; }
  
  .counts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .count-item { padding: 10px; text-align: center; border-radius: 8px; border: 0.5px solid; cursor: pointer; transition: all 0.2s; }
  .count-item:hover { transform: scale(1.05); }
  .count-item.e { background: rgba(55, 138, 221, 0.1); border-color: #378ADD; }
  .count-item.d { background: rgba(186, 117, 23, 0.1); border-color: #BA7517; }
  .count-item.m { background: rgba(99, 153, 34, 0.1); border-color: #639922; }
  .count-num { font-size: 18px; font-weight: 700; margin: 0; }
  .count-item.e .count-num { color: #378ADD; }
  .count-item.d .count-num { color: #BA7517; }
  .count-item.m .count-num { color: #639922; }
  .count-label { font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 4px 0 0 0; color: var(--color-text-secondary); }
  
  .categories { display: grid; gap: 10px; }
  .category { padding: 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; }
  .category-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  
  .score-buttons { display: flex; gap: 6px; }
  .btn-score { padding: 6px 10px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .btn-score:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .btn-score.e { background: #378ADD; border-color: #378ADD; color: white; }
  .btn-score.d { background: #BA7517; border-color: #BA7517; color: white; }
  .btn-score.m { background: #639922; border-color: #639922; color: white; }
  
  .section { margin: 1.5rem 0; padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); }
  .section-title { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.5px; }
  
  textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #A0D4E8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #E3F2FD;
    color: var(--color-text-primary);
  }
  textarea:focus {
    outline: none;
    border-color: #378ADD;
    background: #E3F2FD;
  }
  textarea { resize: vertical; min-height: 80px; }
  
  .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .two-column { grid-template-columns: 1fr; } }
  
  label { display: block; font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  
  button { padding: 10px 16px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: 0.2s; }
  button:hover { background: var(--color-background-secondary); }
  
  .btn-primary { background: #378ADD; border-color: #378ADD; color: white; font-weight: 500; }
  .btn-primary:hover { background: #2966bb; }
  
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
  .modal.show { display: block; }
  .modal-content { background: var(--color-background-secondary); margin: 5% auto; padding: 2rem; border-radius: 12px; border: 1px solid var(--color-border-secondary); width: 90%; max-width: 600px; max-height: 70vh; overflow-y: auto; }
  .close-modal { float: right; font-size: 24px; font-weight: bold; cursor: pointer; color: var(--color-text-secondary); }
  .close-modal:hover { color: var(--color-text-primary); }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0 0 1.5rem 0; color: var(--color-text-primary); }
  .category-item { padding: 12px; margin-bottom: 10px; background: var(--color-background-primary); border-radius: 8px; border-left: 4px solid; }
  .category-item.e { border-color: #378ADD; }
  .category-item.d { border-color: #BA7517; }
  .category-item.m { border-color: #639922; }
  .category-item-name { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
</style>

<div class="container">
  
  <div class="header">
    <h1>Social Studies Assessment Tracker</h1>
  </div>

  <!-- TOP: GRAPH AND CATEGORIES SIDE BY SIDE -->
  <div class="top-boxes">
    
    <!-- LEFT: DISTRIBUTION GRAPH -->
    <div class="box">
      <div class="box-title">Distribution</div>
      <div class="chart-area">
        <svg id="pieChart"></svg>
      </div>
      <div class="counts">
        <div class="count-item e" onclick="showCategoriesByScore('e')">
          <p class="count-num" id="count-e">0</p>
          <p class="count-label">Emerging / Beginning</p>
        </div>
        <div class="count-item d" onclick="showCategoriesByScore('d')">
          <p class="count-num" id="count-d">0</p>
          <p class="count-label">Developing</p>
        </div>
        <div class="count-item m" onclick="showCategoriesByScore('m')">
          <p class="count-num" id="count-m">0</p>
          <p class="count-label">Mastered</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: CATEGORIES TO SCORE -->
    <div class="box">
      <div class="box-title">Assessment Categories</div>
      <div class="categories" id="categoriesList"></div>
    </div>

  </div>

  <!-- COMMENTS -->
  <div class="section">
    <div class="two-column">
      <div>
        <label for="strengthsComment">Strengths</label>
        <textarea id="strengthsComment" placeholder="What is this student doing well in social studies?"></textarea>
      </div>
      <div>
        <label for="stretchesComment">Stretches: Areas of Growth</label>
        <textarea id="stretchesComment" placeholder="What are the challenges or areas where they need more practice?"></textarea>
      </div>
    </div>
  </div>

  <!-- MODAL FOR FILTERED CATEGORIES -->
  <div id="categoriesModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div class="modal-title" id="modalTitle">Emerging / Beginning Categories</div>
      <div id="modalCategoriesList"></div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="section" style="display: flex; gap: 8px; flex-wrap: wrap;">
    <button class="btn-primary" onclick="exportPDF()">Export PDF</button>
    <button onclick="exportJSON()">Export JSON</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="clearForm()">Clear</button>
  </div>

</div>

<script>
const categories = [
  "Participates in Discussions",
  "Asks On-Topic Questions",
  "Demonstrates Curiosity and Engagement",
  "Participates in Shared Research Projects",
  "Identifies Roles and Identity in Communities",
  "Uses Maps, Globes, and Geographic Tools"
];

const scores = {};

function initCategories() {
  categories.forEach(cat => {
    scores[cat] = null;
  });
  renderCategories();
}

function renderCategories() {
  const list = document.getElementById('categoriesList');
  list.innerHTML = '';
  
  categories.forEach(category => {
    const scoreE = scores[category] === 'Emerging' ? 'e' : '';
    const scoreD = scores[category] === 'Developing' ? 'd' : '';
    const scoreM = scores[category] === 'Mastered' ? 'm' : '';
    
    const row = document.createElement('div');
    row.className = 'category';
    row.innerHTML = `
      <div>
        <div class="category-name">${category}</div>
      </div>
      <button class="btn-score ${scoreE}" onclick="setScore('${category.replace(/'/g, "\\'")}', 'Emerging')">E</button>
      <button class="btn-score ${scoreD}" onclick="setScore('${category.replace(/'/g, "\\'")}', 'Developing')">D</button>
      <button class="btn-score ${scoreM}" onclick="setScore('${category.replace(/'/g, "\\'")}', 'Mastered')">M</button>
    `;
    list.appendChild(row);
  });
}

function setScore(category, level) {
  scores[category] = level;
  renderCategories();
  updateCharts();
}

function updateCharts() {
  drawPieChart();
  updateCounts();
}

function updateCounts() {
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  document.getElementById('count-e').textContent = counts.e;
  document.getElementById('count-d').textContent = counts.d;
  document.getElementById('count-m').textContent = counts.m;
}

function drawPieChart() {
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  const total = counts.e + counts.d + counts.m || 1;
  const svg = document.getElementById('pieChart');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 280 160');
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  
  const radius = 50;
  const cx = 80, cy = 70;
  const colors = { e: '#378ADD', d: '#BA7517', m: '#639922' };
  const order = ['e', 'd', 'm'];
  let startAngle = -Math.PI / 2;
  
  order.forEach(key => {
    const value = counts[key];
    if (value === 0) return;
    
    const sliceAngle = (value / total) * 2 * Math.PI;
    const endAngle = startAngle + sliceAngle;
    
    const x1 = cx + radius * Math.cos(startAngle);
    const y1 = cy + radius * Math.sin(startAngle);
    const x2 = cx + radius * Math.cos(endAngle);
    const y2 = cy + radius * Math.sin(endAngle);
    
    const largeArc = sliceAngle > Math.PI ? 1 : 0;
    const pathData = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathData);
    path.setAttribute('fill', colors[key]);
    path.setAttribute('stroke', 'white');
    path.setAttribute('stroke-width', '2');
    path.style.cursor = 'pointer';
    path.onclick = () => showCategoriesByScore(key);
    svg.appendChild(path);
    
    startAngle = endAngle;
  });
}

function showCategoriesByScore(scoreLevel) {
  const levelNames = { e: 'Emerging / Beginning', d: 'Developing', m: 'Mastered' };
  const levelMap = { e: 'Emerging', d: 'Developing', m: 'Mastered' };
  
  const filtered = categories.filter(cat => scores[cat] === levelMap[scoreLevel]);
  
  const modal = document.getElementById('categoriesModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalList = document.getElementById('modalCategoriesList');
  
  modalTitle.textContent = `${levelNames[scoreLevel]} Categories`;
  modalList.innerHTML = '';
  
  if (filtered.length === 0) {
    modalList.innerHTML = '<p style="color: var(--color-text-secondary);">No categories at this level.</p>';
  } else {
    filtered.forEach(category => {
      const item = document.createElement('div');
      item.className = `category-item ${scoreLevel}`;
      item.innerHTML = `<div class="category-item-name">${category}</div>`;
      modalList.appendChild(item);
    });
  }
  
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('categoriesModal').classList.remove('show');
}

window.onclick = function(event) {
  const modal = document.getElementById('categoriesModal');
  if (event.target === modal) {
    modal.classList.remove('show');
  }
}

function exportPDF() {
  try {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      throw new Error('jsPDF library not loaded');
    }
    const { jsPDF } = window.jspdf;
    
    const strengths = document.getElementById('strengthsComment').value;
    const stretches = document.getElementById('stretchesComment').value;
    
    const counts = { e: 0, d: 0, m: 0 };
    Object.values(scores).forEach(score => {
      if (score === 'Emerging') counts.e++;
      else if (score === 'Developing') counts.d++;
      else if (score === 'Mastered') counts.m++;
    });
    
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    let yPosition = 20;
    
    const colors = {
      title: [44, 62, 80],
      emerging: [55, 138, 221],
      developing: [186, 117, 23],
      mastered: [99, 153, 34],
      text: [44, 62, 80],
      lightText: [127, 140, 141]
    };
    
    pdf.setFontSize(20);
    pdf.setTextColor(...colors.title);
    pdf.text('Social Studies Assessment Report', pageWidth / 2, yPosition, { align: 'center' });
    yPosition += 12;
    
    pdf.setFontSize(12);
    pdf.setTextColor(...colors.title);
    pdf.text('Assessment Summary', 15, yPosition);
    yPosition += 8;
    
    pdf.setFontSize(11);
    pdf.setTextColor(...colors.emerging);
    pdf.text(`Emerging / Beginning: ${counts.e}`, 15, yPosition);
    yPosition += 5;
    
    pdf.setTextColor(...colors.developing);
    pdf.text(`Developing: ${counts.d}`, 15, yPosition);
    yPosition += 5;
    
    pdf.setTextColor(...colors.mastered);
    pdf.text(`Mastered: ${counts.m}`, 15, yPosition);
    yPosition += 10;
    
    pdf.setFontSize(13);
    pdf.setTextColor(...colors.mastered);
    pdf.text('Strengths', 15, yPosition);
    yPosition += 6;
    
    pdf.setFontSize(10);
    pdf.setTextColor(...colors.text);
    const strengthsLines = pdf.splitTextToSize(strengths || '(No strengths recorded)', pageWidth - 30);
    pdf.text(strengthsLines, 15, yPosition);
    yPosition += strengthsLines.length * 4 + 5;
    
    const masteredCats = categories.filter(cat => scores[cat] === 'Mastered');
    if (masteredCats.length > 0) {
      pdf.setFontSize(9);
      pdf.setTextColor(...colors.mastered);
      pdf.text('Mastered Categories:', 15, yPosition);
      yPosition += 4;
      pdf.setFontSize(9);
      pdf.setTextColor(...colors.lightText);
      masteredCats.forEach(cat => {
        pdf.text(`• ${cat}`, 18, yPosition);
        yPosition += 4;
      });
      yPosition += 3;
    }
    
    pdf.setFontSize(13);
    pdf.setTextColor(...colors.emerging);
    pdf.text('Stretches: Areas of Growth', 15, yPosition);
    yPosition += 6;
    
    pdf.setFontSize(10);
    pdf.setTextColor(...colors.text);
    const stretchesLines = pdf.splitTextToSize(stretches || '(No stretches recorded)', pageWidth - 30);
    pdf.text(stretchesLines, 15, yPosition);
    yPosition += stretchesLines.length * 4 + 5;
    
    const needsWork = categories.filter(cat => scores[cat] === 'Emerging' || scores[cat] === 'Developing');
    if (needsWork.length > 0) {
      if (yPosition > pageHeight - 30) {
        pdf.addPage();
        yPosition = 20;
      }
      
      pdf.setFontSize(12);
      pdf.setTextColor(...colors.title);
      pdf.text('Needs Work In:', 15, yPosition);
      yPosition += 6;
      
      pdf.setFontSize(10);
      pdf.setTextColor(...colors.text);
      needsWork.forEach(cat => {
        if (yPosition > pageHeight - 10) {
          pdf.addPage();
          yPosition = 20;
        }
        
        const scoreColor = scores[cat] === 'Emerging' ? colors.emerging : colors.developing;
        pdf.setTextColor(...scoreColor);
        pdf.text(`• ${cat}`, 18, yPosition);
        yPosition += 4;
      });
    }
    
    pdf.save('social_studies_assessment_report.pdf');
  } catch (err) {
    alert('Error generating PDF. Please try again. Error: ' + err.message);
    console.error('PDF Export Error:', err);
  }
}

function exportJSON() {
  const strengths = document.getElementById('strengthsComment').value;
  const stretches = document.getElementById('stretchesComment').value;
  
  const assessment = {
    scores: { ...scores },
    strengths: strengths,
    stretches: stretches
  };
  
  const dataStr = JSON.stringify(assessment, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'social_studies_assessment.json';
  a.click();
}

function exportCSV() {
  const strengths = document.getElementById('strengthsComment').value;
  const stretches = document.getElementById('stretchesComment').value;
  
  let csv = 'Category,Score\n';
  
  Object.entries(scores).forEach(([cat, score]) => {
    if (score) {
      csv += `"${cat}","${score}"\n`;
    }
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'social_studies_assessment.csv';
  a.click();
}

function clearForm() {
  document.getElementById('strengthsComment').value = '';
  document.getElementById('stretchesComment').value = '';
  Object.keys(scores).forEach(k => scores[k] = null);
  renderCategories();
  updateCharts();
}

// Initialize
initCategories();
</script>

</body>
</html>
