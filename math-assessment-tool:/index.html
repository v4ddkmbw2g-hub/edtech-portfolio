<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Assessment Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body style="margin: 0; padding: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">

<style>
  :root {
    --color-text-primary: #2c3e50;
    --color-text-secondary: #7f8c8d;
    --color-background-primary: #FBF9F7;
    --color-background-secondary: #F3EFE7;
    --color-border-primary: #378ADD;
    --color-border-secondary: #D4C5B9;
    --color-border-tertiary: #E8DDD4;
  }
  
  * { box-sizing: border-box; }
  body { margin: 0; padding: 1.5rem; background: #E8D4C4; }
  .container { max-width: 1400px; margin: 0 auto; }
  
  .header { margin-bottom: 2rem; }
  .header h1 { margin: 0; font-size: 24px; font-weight: 600; color: var(--color-text-primary); }
  
  .top-boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
  
  .box { padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); }
  .box-title { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .chart-area { background: var(--color-background-primary); border-radius: 8px; padding: 1rem; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 1rem; }
  #pieChart { width: 100%; height: 160px; cursor: pointer; }
  
  .counts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .count-item { padding: 10px; text-align: center; border-radius: 8px; border: 0.5px solid; cursor: pointer; transition: all 0.2s; }
  .count-item:hover { transform: scale(1.05); }
  .count-item.e { background: rgba(55, 138, 221, 0.1); border-color: #378ADD; }
  .count-item.d { background: rgba(186, 117, 23, 0.1); border-color: #BA7517; }
  .count-item.m { background: rgba(99, 153, 34, 0.1); border-color: #639922; }
  .count-num { font-size: 18px; font-weight: 700; margin: 0; }
  .count-item.e .count-num { color: #378ADD; }
  .count-item.d .count-num { color: #BA7517; }
  .count-item.m .count-num { color: #639922; }
  .count-label { font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 4px 0 0 0; color: var(--color-text-secondary); }
  
  select { width: 100%; padding: 12px 14px; border: 1px solid var(--color-border-secondary); border-radius: 8px; font-size: 16px; font-weight: 500; background: var(--color-background-primary); color: var(--color-text-primary); margin-bottom: 1rem; cursor: pointer; }
  
  .lessons { display: grid; gap: 10px; max-height: 350px; overflow-y: auto; }
  .lesson { padding: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; }
  .lesson-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .lesson-unit { font-size: 11px; color: var(--color-text-secondary); display: block; margin-top: 2px; }
  
  .score-buttons { display: flex; gap: 6px; }
  .btn-score { padding: 6px 10px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .btn-score:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .btn-score.e { background: #378ADD; border-color: #378ADD; color: white; }
  .btn-score.d { background: #BA7517; border-color: #BA7517; color: white; }
  .btn-score.m { background: #639922; border-color: #639922; color: white; }
  
  .section { margin: 1.5rem 0; padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); }
  .section-title { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.5px; }
  
  textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #A0D4E8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #E3F2FD;
    color: var(--color-text-primary);
  }
  textarea:focus {
    outline: none;
    border-color: #378ADD;
    background: #E3F2FD;
  }
  textarea { resize: vertical; min-height: 80px; }
  
  .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .two-column { grid-template-columns: 1fr; } }
  
  label { display: block; font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  
  button { padding: 10px 16px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: 0.2s; }
  button:hover { background: var(--color-background-secondary); }
  
  .btn-primary { background: #378ADD; border-color: #378ADD; color: white; font-weight: 500; }
  .btn-primary:hover { background: #2966bb; }
  
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
  .modal.show { display: block; }
  .modal-content { background: var(--color-background-secondary); margin: 5% auto; padding: 2rem; border-radius: 12px; border: 1px solid var(--color-border-secondary); width: 90%; max-width: 600px; max-height: 70vh; overflow-y: auto; }
  .close-modal { float: right; font-size: 24px; font-weight: bold; cursor: pointer; color: var(--color-text-secondary); }
  .close-modal:hover { color: var(--color-text-primary); }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0 0 1.5rem 0; color: var(--color-text-primary); }
  .lesson-item { padding: 12px; margin-bottom: 10px; background: var(--color-background-primary); border-radius: 8px; border-left: 4px solid; }
  .lesson-item.e { border-color: #378ADD; }
  .lesson-item.d { border-color: #BA7517; }
  .lesson-item.m { border-color: #639922; }
  .lesson-item-name { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
  .lesson-item-skill { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
</style>

<div class="container">
  
  <div class="header">
    <h1>Math Assessment Tracker</h1>
  </div>

  <!-- TOP: GRAPH AND LESSONS SIDE BY SIDE -->
  <div class="top-boxes">
    
    <!-- LEFT: DISTRIBUTION GRAPH -->
    <div class="box">
      <div class="box-title">Distribution</div>
      <div class="chart-area">
        <svg id="pieChart"></svg>
      </div>
      <div class="counts">
        <div class="count-item e" onclick="showLessonsByScore('e')">
          <p class="count-num" id="count-e">0</p>
          <p class="count-label">Emerging / Beginning</p>
        </div>
        <div class="count-item d" onclick="showLessonsByScore('d')">
          <p class="count-num" id="count-d">0</p>
          <p class="count-label">Developing</p>
        </div>
        <div class="count-item m" onclick="showLessonsByScore('m')">
          <p class="count-num" id="count-m">0</p>
          <p class="count-label">Mastered</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: SELECT UNIT + LESSONS -->
    <div class="box">
      <div class="box-title">Select Unit</div>
      <select id="unitSelect" onchange="updateLessons()">
        <option value="">Choose a unit...</option>
        <option value="all">All Lessons</option>
      </select>
      <div class="lessons" id="lessonsList"></div>
    </div>

  </div>

  <!-- COMMENTS -->
  <div class="section">
    <div class="two-column">
      <div>
        <label for="strengthsComment">Strengths</label>
        <textarea id="strengthsComment" placeholder="What is this student doing well in math?"></textarea>
      </div>
      <div>
        <label for="stretchesComment">Stretches: Areas of Growth</label>
        <textarea id="stretchesComment" placeholder="What are the challenges or areas where they need more practice?"></textarea>
      </div>
    </div>
  </div>

  <!-- MODAL FOR FILTERED LESSONS -->
  <div id="lessonsModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div class="modal-title" id="modalTitle">Emerging / Beginning Lessons</div>
      <div id="modalLessonsList"></div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="section" style="display: flex; gap: 8px; flex-wrap: wrap;">
    <button class="btn-primary" onclick="exportPDF()">Export PDF</button>
    <button onclick="exportJSON()">Export JSON</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="clearForm()">Clear</button>
  </div>

</div>

<script>
const curriculum = {
  "Geometry & Graphing Data": ["1-7 1st graph", "7-8 Math Journal 186 187", "4-6 First grade", "Tally Marks", "tally mark", "questions data and graphing"],
  "Number Sense & Place Value": ["2-7 cont", "Color number grid", "Number Line", "Equivalent Names for Numbers", "Skip Counting Patterns", "Comparing Numbers", "Doubles Combination of 10", "Making 10 Strategies", "Near Doubles Strategy", "Name Collection Boxes", "Name That Number", "Frames and Arrows", "Fact Families", "Subtraction: counting up and counting back", "Place value to compare numbers", "Base ten blocks to show number", "Playing Salute", "What's My Rule"],
  "Geometry & Shapes": ["How Big is Foot", "The Inch", "The Centimeter", "Measuring of meters", "Measuring with Yards", "Sorting Shapes", "Drawing and Reasoning About Quadrilaterals", "Attributes of 3D shapes"],
  "Addition & Number Stories": ["Addition Number Stories", "2-8 cont", "5-8 Change to more Number Stories", "5-9 Parts and Total Number Stories", "5-10 Change Number Stories", "6-2 Comparison Number Stories", "6-3 Interpreting Number Stories", "6-4 Animal Number Stories", "6-5 Two-Step Number Stories", "8-8 Equal group and array number stories", "8-9 Equal groups and arrays", "8-10 Playing Array Concentration", "9-11 Multiples of 10 and 5 coins"],
  "Subtraction, Place Value & Money": ["Place Value Review", "Partial Sums Addition", "Adding multiple numbers", "Playing Basketball Addition", "Subtraction with Base 10 Blocks", "Expand and Trade subtraction part 1", "Expand and Trade subtraction part 2", "Using coins to buy things", "Counting up with money", "Coin Calculations", "Equivalent Money Amounts", "Estimating Costs"]
};

const scores = {};
let currentUnit = "";

function initUnits() {
  const select = document.getElementById('unitSelect');
  Object.keys(curriculum).forEach(unit => {
    const option = document.createElement('option');
    option.value = unit;
    option.textContent = unit;
    select.appendChild(option);
  });
}

function updateLessons() {
  currentUnit = document.getElementById('unitSelect').value;
  if (!currentUnit) {
    document.getElementById('lessonsList').innerHTML = '';
    return;
  }
  
  const list = document.getElementById('lessonsList');
  list.innerHTML = '';
  
  let lessonsToShow = [];
  
  if (currentUnit === 'all') {
    Object.entries(curriculum).forEach(([unit, lessons]) => {
      lessons.forEach(lesson => {
        lessonsToShow.push({ lesson, unit });
      });
    });
  } else {
    curriculum[currentUnit].forEach(lesson => {
      lessonsToShow.push({ lesson, unit: currentUnit });
    });
  }
  
  lessonsToShow.forEach(({ lesson, unit }) => {
    scores[lesson] = scores[lesson] || null;
    const row = document.createElement('div');
    row.className = 'lesson';
    const scoreE = scores[lesson] === 'Emerging' ? 'e' : '';
    const scoreD = scores[lesson] === 'Developing' ? 'd' : '';
    const scoreM = scores[lesson] === 'Mastered' ? 'm' : '';
    row.innerHTML = `
      <div>
        <div class="lesson-name">${lesson}</div>
        ${currentUnit === 'all' ? `<span class="lesson-unit">${unit}</span>` : ''}
      </div>
      <button class="btn-score ${scoreE}" onclick="setScore('${lesson.replace(/'/g, "\\'")}', 'Emerging')">E</button>
      <button class="btn-score ${scoreD}" onclick="setScore('${lesson.replace(/'/g, "\\'")}', 'Developing')">D</button>
      <button class="btn-score ${scoreM}" onclick="setScore('${lesson.replace(/'/g, "\\'")}', 'Mastered')">M</button>
    `;
    list.appendChild(row);
  });
}

function setScore(lesson, level) {
  scores[lesson] = level;
  updateLessons();
  updateCharts();
}

function updateCharts() {
  drawPieChart();
  updateCounts();
}

function updateCounts() {
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  document.getElementById('count-e').textContent = counts.e;
  document.getElementById('count-d').textContent = counts.d;
  document.getElementById('count-m').textContent = counts.m;
}

function drawPieChart() {
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  const total = counts.e + counts.d + counts.m || 1;
  const svg = document.getElementById('pieChart');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 280 160');
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  
  const radius = 50;
  const cx = 80, cy = 70;
  const colors = { e: '#378ADD', d: '#BA7517', m: '#639922' };
  const order = ['e', 'd', 'm'];
  let startAngle = -Math.PI / 2;
  
  order.forEach(key => {
    const value = counts[key];
    if (value === 0) return;
    
    const sliceAngle = (value / total) * 2 * Math.PI;
    const endAngle = startAngle + sliceAngle;
    
    const x1 = cx + radius * Math.cos(startAngle);
    const y1 = cy + radius * Math.sin(startAngle);
    const x2 = cx + radius * Math.cos(endAngle);
    const y2 = cy + radius * Math.sin(endAngle);
    
    const largeArc = sliceAngle > Math.PI ? 1 : 0;
    const pathData = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathData);
    path.setAttribute('fill', colors[key]);
    path.setAttribute('stroke', 'white');
    path.setAttribute('stroke-width', '2');
    path.style.cursor = 'pointer';
    path.onclick = () => showLessonsByScore(key);
    svg.appendChild(path);
    
    startAngle = endAngle;
  });
}

function showLessonsByScore(scoreLevel) {
  const levelNames = { e: 'Emerging / Beginning', d: 'Developing', m: 'Mastered' };
  const levelMap = { e: 'Emerging', d: 'Developing', m: 'Mastered' };
  
  const lessonsByUnit = {};
  
  Object.entries(curriculum).forEach(([unitName, lessons]) => {
    const needsWork = [];
    
    lessons.forEach(lesson => {
      if (scores[lesson] === levelMap[scoreLevel]) {
        needsWork.push(lesson);
      }
    });
    
    if (needsWork.length > 0) {
      lessonsByUnit[unitName] = needsWork;
    }
  });
  
  const modal = document.getElementById('lessonsModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalList = document.getElementById('modalLessonsList');
  
  modalTitle.textContent = `${levelNames[scoreLevel]} Lessons`;
  modalList.innerHTML = '';
  
  const unitNames = Object.keys(lessonsByUnit);
  
  if (unitNames.length === 0) {
    modalList.innerHTML = '<p style="color: var(--color-text-secondary);">No lessons at this level.</p>';
  } else {
    unitNames.forEach(unitName => {
      const unitHeader = document.createElement('div');
      unitHeader.style.marginTop = '1rem';
      unitHeader.style.marginBottom = '0.75rem';
      unitHeader.style.paddingBottom = '0.5rem';
      unitHeader.style.borderBottom = '2px solid var(--color-border-secondary)';
      unitHeader.style.fontSize = '14px';
      unitHeader.style.fontWeight = '700';
      unitHeader.style.color = 'var(--color-text-primary)';
      unitHeader.textContent = unitName;
      modalList.appendChild(unitHeader);
      
      lessonsByUnit[unitName].forEach(lesson => {
        const item = document.createElement('div');
        item.className = `lesson-item ${scoreLevel}`;
        item.innerHTML = `
          <div class="lesson-item-name">${lesson}</div>
        `;
        modalList.appendChild(item);
      });
    });
  }
  
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('lessonsModal').classList.remove('show');
}

window.onclick = function(event) {
  const modal = document.getElementById('lessonsModal');
  if (event.target === modal) {
    modal.classList.remove('show');
  }
}

function exportPDF() {
  try {
    const { jsPDF } = window.jspdf;
    if (!jsPDF) throw new Error('jsPDF not loaded');
    
    const strengths = document.getElementById('strengthsComment').value;
    const stretches = document.getElementById('stretchesComment').value;
    
    const counts = { e: 0, d: 0, m: 0 };
    Object.values(scores).forEach(score => {
      if (score === 'Emerging') counts.e++;
      else if (score === 'Developing') counts.d++;
      else if (score === 'Mastered') counts.m++;
    });
    
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    let yPosition = 20;
    
    const colors = {
      title: [44, 62, 80],
      emerging: [55, 138, 221],
      developing: [186, 117, 23],
      mastered: [99, 153, 34],
      text: [44, 62, 80],
      lightText: [127, 140, 141]
    };
    
    pdf.setFontSize(20);
    pdf.setTextColor(...colors.title);
    pdf.text('Math Assessment Report', pageWidth / 2, yPosition, { align: 'center' });
    yPosition += 12;
    
    pdf.setFontSize(12);
    pdf.setTextColor(...colors.title);
    pdf.text('Assessment Summary', 15, yPosition);
    yPosition += 8;
    
    pdf.setFontSize(11);
    pdf.setTextColor(...colors.emerging);
    pdf.text(`Emerging / Beginning: ${counts.e}`, 15, yPosition);
    yPosition += 5;
    
    pdf.setTextColor(...colors.developing);
    pdf.text(`Developing: ${counts.d}`, 15, yPosition);
    yPosition += 5;
    
    pdf.setTextColor(...colors.mastered);
    pdf.text(`Mastered: ${counts.m}`, 15, yPosition);
    yPosition += 10;
    
    pdf.setFontSize(13);
    pdf.setTextColor(...colors.mastered);
    pdf.text('Strengths', 15, yPosition);
    yPosition += 6;
    
    pdf.setFontSize(10);
    pdf.setTextColor(...colors.text);
    const strengthsLines = pdf.splitTextToSize(strengths || '(No strengths recorded)', pageWidth - 30);
    pdf.text(strengthsLines, 15, yPosition);
    yPosition += strengthsLines.length * 4 + 5;
    
    const masteredUnits = [];
    Object.entries(curriculum).forEach(([unitName, lessons]) => {
      const hasMastered = lessons.some(lesson => scores[lesson] === 'Mastered');
      if (hasMastered) masteredUnits.push(unitName);
    });
    
    if (masteredUnits.length > 0) {
      pdf.setFontSize(9);
      pdf.setTextColor(...colors.mastered);
      pdf.text('Mastered in:', 15, yPosition);
      yPosition += 4;
      pdf.setFontSize(9);
      pdf.setTextColor(...colors.lightText);
      masteredUnits.forEach(unit => {
        pdf.text(`• ${unit}`, 18, yPosition);
        yPosition += 4;
      });
      yPosition += 3;
    }
    
    pdf.setFontSize(13);
    pdf.setTextColor(...colors.emerging);
    pdf.text('Stretches: Areas of Growth', 15, yPosition);
    yPosition += 6;
    
    pdf.setFontSize(10);
    pdf.setTextColor(...colors.text);
    const stretchesLines = pdf.splitTextToSize(stretches || '(No stretches recorded)', pageWidth - 30);
    pdf.text(stretchesLines, 15, yPosition);
    yPosition += stretchesLines.length * 4 + 5;
    
    const lessonsByUnit = {};
    Object.entries(curriculum).forEach(([unitName, lessons]) => {
      const needsWork = [];
      lessons.forEach(lesson => {
        if (scores[lesson] === 'Emerging' || scores[lesson] === 'Developing') {
          needsWork.push({ lesson, score: scores[lesson] });
        }
      });
      if (needsWork.length > 0) {
        lessonsByUnit[unitName] = needsWork;
      }
    });
    
    if (Object.keys(lessonsByUnit).length > 0) {
      if (yPosition > pageHeight - 30) {
        pdf.addPage();
        yPosition = 20;
      }
      
      pdf.setFontSize(12);
      pdf.setTextColor(...colors.title);
      pdf.text('Needs Work In:', 15, yPosition);
      yPosition += 6;
      
      Object.entries(lessonsByUnit).forEach(([unitName, lessons]) => {
        if (yPosition > pageHeight - 20) {
          pdf.addPage();
          yPosition = 20;
        }
        
        pdf.setFontSize(10);
        pdf.setTextColor(...colors.title);
        pdf.text(unitName, 18, yPosition);
        yPosition += 4;
        
        lessons.forEach(item => {
          if (yPosition > pageHeight - 10) {
            pdf.addPage();
            yPosition = 20;
          }
          
          pdf.setFontSize(8);
          const scoreColor = item.score === 'Emerging' ? colors.emerging : colors.developing;
          pdf.setTextColor(...scoreColor);
          pdf.text(`${item.lesson}`, 21, yPosition);
          yPosition += 3;
        });
        yPosition += 2;
      });
    }
    
    pdf.save('math_assessment_report.pdf');
  } catch (err) {
    alert('Error generating PDF. Please try again. Error: ' + err.message);
    console.error('PDF Export Error:', err);
  }
}

function exportJSON() {
  const strengths = document.getElementById('strengthsComment').value;
  const stretches = document.getElementById('stretchesComment').value;
  
  const assessment = {
    unit: currentUnit || 'All Units',
    scores: { ...scores },
    strengths: strengths,
    stretches: stretches
  };
  
  const dataStr = JSON.stringify(assessment, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'math_assessment.json';
  a.click();
}

function exportCSV() {
  const strengths = document.getElementById('strengthsComment').value;
  const stretches = document.getElementById('stretchesComment').value;
  
  let csv = 'Lesson,Score\n';
  
  Object.entries(scores).forEach(([lesson, score]) => {
    if (score) {
      csv += `"${lesson}","${score}"\n`;
    }
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'math_assessment.csv';
  a.click();
}

function clearForm() {
  document.getElementById('unitSelect').value = '';
  document.getElementById('strengthsComment').value = '';
  document.getElementById('stretchesComment').value = '';
  Object.keys(scores).forEach(k => scores[k] = null);
  currentUnit = "";
  document.getElementById('lessonsList').innerHTML = '';
  updateCharts();
}

// Initialize
initUnits();
</script>

</body>
</html>
