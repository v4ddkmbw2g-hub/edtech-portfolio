<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Assessment Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body style="margin: 0; padding: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">

<style>
  :root {
    --color-text-primary: #2c3e50;
    --color-text-secondary: #7f8c8d;
    --color-background-primary: #FBF9F7;
    --color-background-secondary: #F3EFE7;
    --color-border-primary: #378ADD;
    --color-border-secondary: #D4C5B9;
    --color-border-tertiary: #E8DDD4;
  }
  
  * { box-sizing: border-box; }
  body { margin: 0; padding: 1.5rem; background: #E8D4C4; }
  .container { max-width: 1400px; margin: 0 auto; }
  
  .header { margin-bottom: 2rem; }
  .header h1 { margin: 0; font-size: 24px; font-weight: 600; color: var(--color-text-primary); }
  
  .top-boxes { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
  
  .box { padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); }
  .box-title { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .chart-area { background: var(--color-background-primary); border-radius: 8px; padding: 1rem; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 1rem; }
  #pieChart { width: 100%; height: 160px; cursor: pointer; }
  
  .counts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .count-item { padding: 10px; text-align: center; border-radius: 8px; border: 0.5px solid; cursor: pointer; transition: all 0.2s; }
  .count-item:hover { transform: scale(1.05); }
  .count-item.e { background: rgba(55, 138, 221, 0.1); border-color: #378ADD; }
  .count-item.d { background: rgba(186, 117, 23, 0.1); border-color: #BA7517; }
  .count-item.m { background: rgba(99, 153, 34, 0.1); border-color: #639922; }
  .count-num { font-size: 18px; font-weight: 700; margin: 0; }
  .count-item.e .count-num { color: #378ADD; }
  .count-item.d .count-num { color: #BA7517; }
  .count-item.m .count-num { color: #639922; }
  .count-label { font-size: 11px; font-weight: 600; text-transform: uppercase; margin: 4px 0 0 0; color: var(--color-text-secondary); }
  
  .skills { display: grid; gap: 10px; max-height: 350px; overflow-y: auto; }
  .skill { padding: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; }
  .skill-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  
  .score-buttons { display: flex; gap: 6px; }
  .btn-score { padding: 6px 10px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .btn-score:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .btn-score.e { background: #378ADD; border-color: #378ADD; color: white; }
  .btn-score.d { background: #BA7517; border-color: #BA7517; color: white; }
  .btn-score.m { background: #639922; border-color: #639922; color: white; }
  
  .section { margin: 1.5rem 0; padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); }
  
  input[type="date"], textarea, input[type="file"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #A0D4E8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #E3F2FD;
    color: var(--color-text-primary);
  }
  input[type="date"]:focus, textarea:focus, input[type="file"]:focus {
    outline: none;
    border-color: #378ADD;
    background: #E3F2FD;
  }
  textarea { resize: vertical; min-height: 80px; }
  
  label { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 1rem; }
  
  .two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .two-column { grid-template-columns: 1fr; } }
  
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
  .modal.show { display: block; }
  .modal-content { background: var(--color-background-secondary); margin: 5% auto; padding: 2rem; border-radius: 12px; border: 1px solid var(--color-border-secondary); width: 90%; max-width: 600px; max-height: 70vh; overflow-y: auto; }
  .close-modal { float: right; font-size: 24px; font-weight: bold; cursor: pointer; color: var(--color-text-secondary); }
  .close-modal:hover { color: var(--color-text-primary); }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0 0 1.5rem 0; color: var(--color-text-primary); }
  .skill-item { padding: 12px; margin-bottom: 10px; background: var(--color-background-primary); border-radius: 8px; border-left: 4px solid; }
  .skill-item.e { border-color: #378ADD; }
  .skill-item.d { border-color: #BA7517; }
  .skill-item.m { border-color: #639922; }
  .skill-item-name { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
  
  button { padding: 10px 16px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: 0.2s; }
  button:hover { background: var(--color-background-secondary); }
  
  .btn-primary { background: #378ADD; border-color: #378ADD; color: white; font-weight: 500; }
  .btn-primary:hover { background: #2966bb; }
</style>

<div class="container">
  
  <div class="header">
    <h1>Reading Assessment Tool</h1>
  </div>

  <!-- TOP: GRAPH AND SKILLS SIDE BY SIDE -->
  <div class="top-boxes">
    
    <!-- LEFT: DISTRIBUTION GRAPH -->
    <div class="box">
      <div class="box-title">Distribution</div>
      <div class="chart-area">
        <svg id="pieChart"></svg>
      </div>
      <div class="counts">
        <div class="count-item e" onclick="showSkillsByScore('e')">
          <p class="count-num" id="count-e">0</p>
          <p class="count-label">Emerging</p>
        </div>
        <div class="count-item d" onclick="showSkillsByScore('d')">
          <p class="count-num" id="count-d">0</p>
          <p class="count-label">Developing</p>
        </div>
        <div class="count-item m" onclick="showSkillsByScore('m')">
          <p class="count-num" id="count-m">0</p>
          <p class="count-label">Mastered</p>
        </div>
      </div>
    </div>

    <!-- RIGHT: SKILLS LIST -->
    <div class="box">
      <div class="box-title">All Skills</div>
      <div class="skills" id="skillsList"></div>
    </div>

  </div>

  <!-- COMMENTS -->
  <div class="section">
    <div class="two-column">
      <div>
        <label for="strengthsComment">Strengths</label>
        <textarea id="strengthsComment" placeholder="What is this student doing well in reading?"></textarea>
      </div>
      <div>
        <label for="stretchesComment">Stretches: Areas of Growth</label>
        <textarea id="stretchesComment" placeholder="What are the challenges or areas where they need more practice?"></textarea>
      </div>
    </div>
  </div>

  <!-- MODAL FOR FILTERED SKILLS -->
  <div id="skillsModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div class="modal-title" id="modalTitle">Emerging Skills</div>
      <div id="modalSkillsList"></div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="section" style="display: flex; gap: 8px; flex-wrap: wrap;">
    <button class="btn-primary" onclick="exportPDF()">Export PDF</button>
    <button onclick="clearForm()">Clear</button>
  </div>

</div>

<script>
const READING_SKILLS = [
  "Demonstrates curiosity and engagement in reading",
  "Decodes two-syllable words with common vowel patterns",
  "Reads grade level text with fluency",
  "Asks and answers comprehension questions",
  "Retells stories",
  "Beginning to identify the main topic and key details in informational texts"
];

let scores = {};

function renderSkills() {
  const skillsList = document.getElementById('skillsList');
  skillsList.innerHTML = '';
  
  READING_SKILLS.forEach(skill => {
    const score = scores[skill] || null;
    const scoreE = score === 'Emerging' ? 'e' : '';
    const scoreD = score === 'Developing' ? 'd' : '';
    const scoreM = score === 'Mastered' ? 'm' : '';
    
    const skillEl = document.createElement('div');
    skillEl.className = 'skill';
    skillEl.innerHTML = `
      <div class="skill-name">${skill}</div>
      <div class="score-buttons">
        <button class="btn-score ${scoreE}" onclick="setScore('${skill}', 'Emerging')">E</button>
        <button class="btn-score ${scoreD}" onclick="setScore('${skill}', 'Developing')">D</button>
        <button class="btn-score ${scoreM}" onclick="setScore('${skill}', 'Mastered')">M</button>
      </div>
    `;
    skillsList.appendChild(skillEl);
  });
}

function setScore(skill, level) {
  scores[skill] = level;
  renderSkills();
  updateCharts();
  localStorage.setItem('readingScores', JSON.stringify(scores));
}

function updateCharts() {
  drawPieChart();
  updateCounts();
}

function updateCounts() {
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  document.getElementById('count-e').textContent = counts.e;
  document.getElementById('count-d').textContent = counts.d;
  document.getElementById('count-m').textContent = counts.m;
}

function drawPieChart() {
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  const total = counts.e + counts.d + counts.m || 1;
  const svg = document.getElementById('pieChart');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 280 160');
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  
  const radius = 50;
  const cx = 80, cy = 70;
  const colors = { e: '#378ADD', d: '#BA7517', m: '#639922' };
  const order = ['e', 'd', 'm'];
  let startAngle = -Math.PI / 2;
  
  order.forEach(key => {
    const value = counts[key];
    if (value === 0) return;
    
    const sliceAngle = (value / total) * 2 * Math.PI;
    const endAngle = startAngle + sliceAngle;
    
    const x1 = cx + radius * Math.cos(startAngle);
    const y1 = cy + radius * Math.sin(startAngle);
    const x2 = cx + radius * Math.cos(endAngle);
    const y2 = cy + radius * Math.sin(endAngle);
    
    const largeArc = sliceAngle > Math.PI ? 1 : 0;
    const pathData = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathData);
    path.setAttribute('fill', colors[key]);
    path.setAttribute('stroke', 'white');
    path.setAttribute('stroke-width', '2');
    path.style.cursor = 'pointer';
    path.onclick = () => showSkillsByScore(key);
    svg.appendChild(path);
    
    startAngle = endAngle;
  });
}

function showSkillsByScore(scoreLevel) {
  const levelNames = { e: 'Emerging', d: 'Developing', m: 'Mastered' };
  const levelMap = { e: 'Emerging', d: 'Developing', m: 'Mastered' };
  
  const skillsByScore = READING_SKILLS.filter(skill => scores[skill] === levelMap[scoreLevel]);
  
  const modalList = document.getElementById('modalSkillsList');
  modalList.innerHTML = '';
  
  if (skillsByScore.length === 0) {
    modalList.innerHTML = '<p style="color: #999;">No skills in this category.</p>';
  } else {
    skillsByScore.forEach(skill => {
      const skillItem = document.createElement('div');
      skillItem.className = `skill-item ${scoreLevel}`;
      skillItem.innerHTML = `<div class="skill-item-name">${skill}</div>`;
      modalList.appendChild(skillItem);
    });
  }
  
  document.getElementById('modalTitle').textContent = `${levelNames[scoreLevel]} Skills`;
  document.getElementById('skillsModal').classList.add('show');
}

function closeModal() {
  document.getElementById('skillsModal').classList.remove('show');
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  
  const strengths = document.getElementById('strengthsComment').value;
  const stretches = document.getElementById('stretchesComment').value;
  
  const counts = { e: 0, d: 0, m: 0 };
  Object.values(scores).forEach(score => {
    if (score === 'Emerging') counts.e++;
    else if (score === 'Developing') counts.d++;
    else if (score === 'Mastered') counts.m++;
  });
  
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  let yPosition = 20;
  
  const colors = {
    title: [44, 62, 80],
    emerging: [55, 138, 221],
    developing: [186, 117, 23],
    mastered: [99, 153, 34],
    text: [44, 62, 80],
    lightText: [127, 140, 141]
  };
  
  pdf.setFontSize(20);
  pdf.setTextColor(...colors.title);
  pdf.text('Reading Assessment Report', pageWidth / 2, yPosition, { align: 'center' });
  yPosition += 12;
  
  pdf.setFontSize(12);
  pdf.setTextColor(...colors.title);
  pdf.text('Assessment Summary', 15, yPosition);
  yPosition += 8;
  
  pdf.setFontSize(11);
  pdf.setTextColor(...colors.emerging);
  pdf.text(`Emerging: ${counts.e}`, 15, yPosition);
  yPosition += 5;
  
  pdf.setTextColor(...colors.developing);
  pdf.text(`Developing: ${counts.d}`, 15, yPosition);
  yPosition += 5;
  
  pdf.setTextColor(...colors.mastered);
  pdf.text(`Mastered: ${counts.m}`, 15, yPosition);
  yPosition += 10;
  
  pdf.setFontSize(13);
  pdf.setTextColor(...colors.mastered);
  pdf.text('Strengths', 15, yPosition);
  yPosition += 6;
  
  pdf.setFontSize(10);
  pdf.setTextColor(...colors.text);
  const strengthsLines = pdf.splitTextToSize(strengths || '(No strengths recorded)', pageWidth - 30);
  pdf.text(strengthsLines, 15, yPosition);
  yPosition += strengthsLines.length * 4 + 5;
  
  pdf.setFontSize(13);
  pdf.setTextColor(...colors.emerging);
  pdf.text('Stretches: Areas of Growth', 15, yPosition);
  yPosition += 6;
  
  pdf.setFontSize(10);
  pdf.setTextColor(...colors.text);
  const stretchesLines = pdf.splitTextToSize(stretches || '(No stretches recorded)', pageWidth - 30);
  pdf.text(stretchesLines, 15, yPosition);
  yPosition += stretchesLines.length * 4 + 5;
  
  if (yPosition > pageHeight - 30) {
    pdf.addPage();
    yPosition = 20;
  }
  
  pdf.setFontSize(12);
  pdf.setTextColor(...colors.title);
  pdf.text('Skills Assessment', 15, yPosition);
  yPosition += 6;
  
  READING_SKILLS.forEach(skill => {
    if (yPosition > pageHeight - 10) {
      pdf.addPage();
      yPosition = 20;
    }
    
    pdf.setFontSize(10);
    const score = scores[skill];
    const scoreColor = score === 'Emerging' ? colors.emerging : score === 'Developing' ? colors.developing : score === 'Mastered' ? colors.mastered : colors.lightText;
    pdf.setTextColor(...scoreColor);
    pdf.text(`${skill}: ${score || 'Not Scored'}`, 15, yPosition);
    yPosition += 4;
  });
  
  pdf.save('reading_assessment_report.pdf');
}

function clearForm() {
  if (confirm('Clear all data?')) {
    scores = {};
    document.getElementById('strengthsComment').value = '';
    document.getElementById('stretchesComment').value = '';
    renderSkills();
    updateCharts();
    localStorage.removeItem('readingScores');
    localStorage.removeItem('readingStrengths');
    localStorage.removeItem('readingStretches');
  }
}

function loadData() {
  const savedScores = localStorage.getItem('readingScores');
  const savedStrengths = localStorage.getItem('readingStrengths');
  const savedStretches = localStorage.getItem('readingStretches');
  
  if (savedScores) scores = JSON.parse(savedScores);
  if (savedStrengths) document.getElementById('strengthsComment').value = savedStrengths;
  if (savedStretches) document.getElementById('stretchesComment').value = savedStretches;
}

// Initialize
loadData();
renderSkills();
updateCharts();

// Auto-save comments
document.getElementById('strengthsComment').addEventListener('change', () => {
  localStorage.setItem('readingStrengths', document.getElementById('strengthsComment').value);
});
document.getElementById('stretchesComment').addEventListener('change', () => {
  localStorage.setItem('readingStretches', document.getElementById('stretchesComment').value);
});
</script>

</body>
</html>
